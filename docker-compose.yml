services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"   # HTTP REST + dashboard
      - "6334:6334"   # gRPC
    volumes:
      - ./data/qdrant_storage:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - QDRANT_HOST=qdrant   # sobrescreve localhost → nome do serviço Docker
    depends_on:
      qdrant:
        condition: service_healthy
